services:
  - type: web
    name: datacleaningprog-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://data-cleaning-prog.vercel.app
